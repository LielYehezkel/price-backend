services:
  - type: web
    name: price-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && cd /opt/render/project && ln -sf src backend
    startCommand: cd /opt/render/project && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: price-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://YOUR-FRONTEND.vercel.app
      - key: PUBLIC_API_BASE
        value: https://price-backend.onrender.com

databases:
  - name: price-db
    databaseName: pricedb
    user: priceuser
    plan: starter
